<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* نفس الأنماط الأساسية للبوابة */
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at 70% 30%, #141c2b, #0a0e16); color: #f0f4fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .error-container { text-align: center; max-width: 500px; padding: 2rem; background: rgba(18,24,36,0.85); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(180,133,84,0.25); }
        .error-container i { font-size: 4rem; color: #cfa776; margin-bottom: 1rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; margin-bottom: 2rem; }
        .btn { background: rgba(180,133,84,0.2); border: 1px solid rgba(180,133,84,0.3); border-radius: 40px; padding: 0.8rem 2rem; color: #cfa776; text-decoration: none; font-weight: 700; transition: all 0.3s ease; }
        .btn:hover { background: rgba(180,133,84,0.4); color: #fff; border-color: #b48554; }
    </style>
</head>
<body>
    <div class="error-container">
        <i class="fas fa-exclamation-triangle"></i>
        <h1>404</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير موجودة.</p>
        <a href="/" class="btn"><i class="fas fa-home"></i> العودة للرئيسية</a>
    </div>
</body>
</html>
